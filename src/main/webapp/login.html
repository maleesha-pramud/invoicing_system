<!DOCTYPE html>

<html lang="en"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login - InvoiceManager</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0b50da",
                        "background-light": "#f5f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Manrope', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display">
<div class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="max-w-md w-full">
        <!-- Branding Area -->
        <div class="flex flex-col items-center mb-8">
            <div class="flex items-center gap-3 text-primary mb-2">
                <div class="p-2 bg-primary/10 rounded-lg">
                    <svg class="w-8 h-8" fill="currentColor" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                        <path clip-rule="evenodd" d="M24 4H42V17.3333V30.6667H24V44H6V30.6667V17.3333H24V4Z" fill="currentColor" fill-rule="evenodd"></path>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-slate-100">Invoicing System</h1>
            </div>
            <h2 class="text-xl font-semibold text-slate-800 dark:text-slate-200 mt-4">Welcome back!</h2>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Please enter your details to access your dashboard.</p>
        </div>
        <!-- Login Card -->
        <div class="bg-white dark:bg-slate-900 shadow-xl shadow-primary/5 rounded-xl border border-slate-200 dark:border-slate-800 p-8">
            <form action="#" class="space-y-5" method="POST">
                <!-- Email Field -->
                <div class="space-y-1.5">
                    <label class="text-sm font-medium text-slate-700 dark:text-slate-300" for="email">Email Address</label>
                    <div class="relative">
                        <input class="w-full h-12 px-4 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" id="email" name="email" placeholder="e.g., name@company.com" required="" type="email"/>
                    </div>
                </div>
                <!-- Password Field -->
                <div class="space-y-1.5">
                    <div class="flex justify-between items-center">
                        <label class="text-sm font-medium text-slate-700 dark:text-slate-300" for="password">Password</label>
                        <a class="text-xs font-semibold text-primary hover:text-primary/80 transition-colors" href="#">Forgot password?</a>
                    </div>
                    <div class="relative group">
                        <input class="w-full h-12 pl-4 pr-12 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" id="password" name="password" placeholder="••••••••" required="" type="password"/>
                        <button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300" type="button">
                            <span class="material-symbols-outlined text-xl">visibility</span>
                        </button>
                    </div>
                </div>
                <!-- Remember Me -->
                <div class="flex items-center">
                    <input class="h-4 w-4 rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary/50" id="remember-me" name="remember-me" type="checkbox"/>
                    <label class="ml-2 block text-sm text-slate-600 dark:text-slate-400" for="remember-me">
                        Remember me for 30 days
                    </label>
                </div>
                <!-- Sign In Button -->
                <button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 px-4 rounded-lg transition-all transform active:scale-[0.98] shadow-lg shadow-primary/20" type="submit">
                    Sign In
                </button>
            </form>
        </div>
    </div>
</div>
<!-- Page Background Decoration -->
<div class="fixed top-0 right-0 -z-10 opacity-10 dark:opacity-5 pointer-events-none">
    <div class="w-[500px] h-[500px] bg-primary rounded-full blur-[100px] -mr-48 -mt-48"></div>
</div>
<div class="fixed bottom-0 left-0 -z-10 opacity-10 dark:opacity-5 pointer-events-none">
    <div class="w-[500px] h-[500px] bg-primary rounded-full blur-[100px] -ml-48 -mb-48"></div>
</div>
<!-- Accessibility Footer -->
<footer class="py-6 px-4 border-t border-slate-200 dark:border-slate-800 mt-auto">
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-center items-center gap-4 text-xs text-slate-500 dark:text-slate-400">
        <p>© 2024 InvoiceManager Inc. All rights reserved.</p>
    </div>
</footer>
</body></html>
